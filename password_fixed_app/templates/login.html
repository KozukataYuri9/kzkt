{% extends "base.html" %}

{% block title %}登录 - 用户管理系统{% endblock %}

{% block content %}
<section class="card login-card">
    <h1 class="card-title">用户登录</h1>

    {% if message %}
        <div class="success-message">{{ message }}</div>
    {% endif %}

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form class="login-form" method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" id="username" name="username" type="text" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" id="password" name="password" type="password" required>
        </div>
        <button class="button form-button" type="submit">登录</button>
    </form>
</section>
{% endblock %}
