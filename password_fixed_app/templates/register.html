{% extends "base.html" %}

{% block title %}注册 - 用户管理系统{% endblock %}

{% block content %}
<section class="card login-card">
    <h1 class="card-title">用户注册</h1>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form class="login-form" method="post" action="/register">
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" id="username" name="username" type="text" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" id="password" name="password" type="password" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">邮箱</label>
            <input class="form-input" id="email" name="email" type="email" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="phone">手机号</label>
            <input class="form-input" id="phone" name="phone" type="text" required>
        </div>
        <button class="button form-button" type="submit">注册</button>
    </form>
</section>
{% endblock %}
